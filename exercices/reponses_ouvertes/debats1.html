<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Débats – Proactif</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body{
    font-family: Arial, sans-serif;
    background:#eef2f6;
    padding:20px;
    margin:0;
  }

  h1{
    text-align:center;
    color:#004c97;
    margin-bottom:30px;
  }

  /* BOUTONS */
  .btn{
    display:block;
    margin:0 auto 20px;
    padding:12px 20px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
    font-weight:bold;
  }

  #btnRandom{
    background:#004c97;
    color:white;
  }
  #btnRandom:hover{
    background:#0059b8;
  }

  #btnDone{
    background:#2e7d32;
    color:white;
    margin-top:25px;
  }
  #btnDone:hover{
    background:#3fa043;
  }

  #btnReset{
    background:#c62828;
    color:white;
    display:none;
  }
  #btnReset:hover{
    background:#e53935;
  }

  /* BLOC DÉBAT */
  #box{
    display:none;
    max-width:720px;
    margin:20px auto;
    background:white;
    padding:25px 30px;
    border-radius:14px;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
    animation:fade .3s ease;
  }

  @keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
  }

  .titre{
    font-size:22px;
    font-weight:bold;
    color:#004c97;
    margin-bottom:15px;
  }

  .sectionTitle{
    font-weight:bold;
    font-size:16px;
    color:#004c97;
    margin-top:20px;
  }

  ul{
    margin:8px 0 0 18px;
  }
  ul li{
    margin-bottom:6px;
  }

  .doneMsg{
    text-align:center;
    font-size:22px;
    margin-top:30px;
    color:#004c97;
    display:none;
  }
</style>

</head>
<body>

<h1>🎭 Débats – Proactif</h1>

<button id="btnRandom" class="btn" onclick="newDebat()">🎲 Nouveau débat aléatoire</button>
<button id="btnReset" class="btn" onclick="resetAll()">🔄 Réinitialiser tout</button>

<div id="box">
  <div class="titre" id="titre"></div>

  <div class="sectionTitle">❓ Question</div>
  <div id="question"></div>

  <div class="sectionTitle">🧩 Aides pour commencer</div>
  <ul id="aides"></ul>

  <div class="sectionTitle">💬 Relances</div>
  <ul id="relances"></ul>

  <button id="btnDone" onclick="markDone()">✔ Marquer comme fait</button>
</div>

<div class="doneMsg" id="doneMsg">🎉 Tous les débats sont faits !</div>

<script>
let debats = [];
let done = JSON.parse(localStorage.getItem("debatsDone") || "[]");
let current = null;

/* Charger le JSON */
fetch("debats.json")
  .then(res => res.json())
  .then(data => {
    debats = data;
    updateResetVisibility();
  });

/* Nouveau débat */
function newDebat(){
  const remaining = debats.filter(d => !done.includes(d.id));

  if(remaining.length === 0){
    document.getElementById("box").style.display = "none";
    document.getElementById("doneMsg").style.display = "block";
    return;
  }

  document.getElementById("doneMsg").style.display = "none";

  current = remaining[Math.floor(Math.random() * remaining.length)];

  // Remplir l'affichage
  document.getElementById("titre").innerText = current.titre;
  document.getElementById("question").innerText = current.question;

  const a = document.getElementById("aides");
  a.innerHTML = "";
  current.aides.forEach(x=>{
    const li=document.createElement("li");
    li.innerText=x;
    a.appendChild(li);
  });

  const r = document.getElementById("relances");
  r.innerHTML = "";
  current.relances.forEach(x=>{
    const li=document.createElement("li");
    li.innerText=x;
    r.appendChild(li);
  });

  document.getElementById("box").style.display = "block";
}

/* Marquer comme fait */
function markDone(){
  if(!current) return;

  if(!done.includes(current.id)){
    done.push(current.id);
    localStorage.setItem("debatsDone", JSON.stringify(done));
  }

  updateResetVisibility();
  newDebat();
}

/* Reset */
function resetAll(){
  if(!confirm("Réinitialiser tous les débats ?")) return;

  done = [];
  localStorage.removeItem("debatsDone");
  document.getElementById("box").style.display = "none";
  document.getElementById("doneMsg").style.display = "none";
  updateResetVisibility();
}

/* Affichage du bouton reset */
function updateResetVisibility(){
  document.getElementById("btnReset").style.display =
    done.length > 0 ? "block" : "none";
}
</script>

</body>
</html>
