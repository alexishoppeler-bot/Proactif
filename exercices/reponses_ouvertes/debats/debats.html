<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Débats oraux – Proactif</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #e8f3f1;
    --card: #ffffff;
    --text: #00332e;
    --accent: #009688;
  }
  body.dark {
    --bg: #0d1514;
    --card: #1c2625;
    --text: #d6f5ef;
    --accent: #4dd0e1;
  }

  body{
    font-family: Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:0.3s;
  }
  .app{
    width:900px;
    max-width:95%;
    background:var(--card);
    padding:30px;
    border-radius:18px;
    box-shadow:0 6px 22px rgba(0,0,0,0.2);
    border-top:10px solid var(--accent);
    transition:0.3s;
  }
  h1{
    text-align:center;
    margin-bottom:20px;
    font-size:28px;
    color:var(--accent);
  }
  .controls{
    text-align:center;
    margin-bottom:20px;
  }
  button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    margin:5px;
    background:var(--accent);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
  }
  button:hover{
    opacity:0.8;
  }
  .toggle-dark{
    position:absolute;
    top:20px;
    right:20px;
    background:#263230;
  }

  .bloc{
    margin-bottom:25px;
    padding:20px;
    background:#f4fbfa;
    border-radius:12px;
    font-size:20px;
    line-height:1.5;
    transition:0.3s;
  }
  body.dark .bloc{
    background:#1e2b2a;
  }

  textarea{
    width:100%;
    height:130px;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #7bb1a8;
    background:var(--card);
    color:var(--text);
    resize:none;
  }

  .validate-btn{
    width:100%;
    margin-top:15px;
    font-size:18px;
    background:#00695c;
  }
</style>
</head>

<body>

<button class="toggle-dark" onclick="toggleDark()">🌙 / ☀️</button>

<div class="app">

  <h1>Débats oraux – Proactif</h1>

  <div class="controls">
    <button onclick="choisirNiveau(1)">Niveau 1</button>
    <button onclick="choisirNiveau(2)">Niveau 2</button>
    <button onclick="choisirNiveau(3)">Niveau 3</button>
  </div>

  <div id="zone-debat" class="bloc">
    👉 Choisissez un niveau pour commencer.
  </div>

  <div id="zone-aides" class="bloc"></div>

  <div class="bloc">
    <b>Votre réponse :</b>
    <textarea id="reponse" placeholder="Écrivez avant de valider..."></textarea>
    <button class="validate-btn" onclick="valider()">Valider</button>
  </div>

</div>

<script>
let DATA = null;
let niveau = 0;
let index = 0;
let liste = [];

// Mode sombre
function toggleDark(){
  document.body.classList.toggle("dark");
}

// Charger JSON
fetch("debats.json")
  .then(r => r.json())
  .then(json => DATA = json)
  .catch(() => alert("Impossible de charger debats.json"));

// Choisir niveau (1 = A1, 2 = A2, 3 = B1)
function choisirNiveau(n){
  if(!DATA){ alert("JSON pas encore chargé"); return; }

  niveau = n;
  index = 0;

  if(n == 1) liste = DATA.A1;
  if(n == 2) liste = DATA.A2;
  if(n == 3) liste = DATA.B1;

  afficherDebat();
}

// Affiche le débat courant
function afficherDebat(){
  if(index >= liste.length){
    document.getElementById("zone-debat").innerHTML = "🎉 Série terminée !";
    document.getElementById("zone-aides").innerHTML = "";
    return;
  }

  const debat = liste[index];

  document.getElementById("zone-debat").innerHTML =
    `<b>Débat ${index+1}</b><br><br>${debat.titre}<br><br>${debat.question}`;

  document.getElementById("zone-aides").innerHTML =
    `<b>Phrases d’aide :</b><br><ul>${debat.aides.map(a=>`<li>${a}</li>`).join("")}</ul>`;

  document.getElementById("reponse").value = "";
}

// Valider → passer au prochain
function valider(){
  const rep = document.getElementById("reponse").value.trim();
  if(rep === ""){
    alert("❗ Écris une réponse avant de valider.");
    return;
  }

  // Sauvegarde locale optionnelle
  localStorage.setItem("deb_"+Date.now(), rep);

  index++;
  afficherDebat();
}
</script>

</body>
</html>
