<style>

/* ----------- GLOBAL ----------- */

:root {
  --main:#004c97;
  --bg:#eef2f6;
  --card-bg:rgba(255,255,255,0.45);
  --text:#000;
  --glass-border:rgba(255,255,255,0.35);
}

body.dark {
  --bg:#0f172a;
  --card-bg:rgba(255,255,255,0.1);
  --text:#fff;
  --glass-border:rgba(255,255,255,0.15);
}

body{
  margin:0;
  padding:20px;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* ----------- HEADER ----------- */

.topBar{
  max-width:750px;
  margin:auto;
  text-align:center;
  position:relative;
}

h1{
  color:var(--main);
  margin-bottom:10px;
}

/* DARK MODE BUTTON */

#darkToggle{
  position:absolute;
  right:0;
  top:0;
  cursor:pointer;
  font-size:22px;
  padding:6px 10px;
  border-radius:8px;
  transition:.3s;
}

#darkToggle:hover{
  background:rgba(0,0,0,0.1);
}

/* COMPTEUR + PROGRESSION */

#compteur{
  margin-top:5px;
  font-size:17px;
  font-weight:bold;
  color:var(--text);
}

.progressContainer{
  width:100%;
  background:rgba(0,0,0,0.1);
  height:10px;
  border-radius:10px;
  margin:10px auto 25px;
  overflow:hidden;
}

.progressBar{
  width:0%;
  height:100%;
  background:var(--main);
  transition:width .4s ease;
}

/* ----------- BUTTONS ----------- */

.btn{
  display:block;
  margin:0 auto 20px;
  padding:12px 20px;
  font-size:17px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
  font-weight:bold;
  max-width:300px;
  color:white;
}

#btnRandom{ background:var(--main); }
#btnRandom:hover{ transform:scale(1.03); }

#btnDone{ background:#2e7d32; }
#btnDone:hover{ transform:scale(1.03); }

#btnReset{
  background:#c62828;
  display:none;
}
#btnReset:hover{ transform:scale(1.03); }

#btnCopy{
  background:#555;
  margin-top:10px;
}
#btnCopy:hover{ transform:scale(1.03); }

/* ----------- CARD (Glassmorphism) ----------- */

#box{
  display:none;
  max-width:750px;
  margin:20px auto;
  padding:25px 30px;
  border-radius:18px;
  background:var(--card-bg);
  backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  animation:fadeUp .4s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

.titre{
  font-size:23px;
  font-weight:bold;
  color:var(--main);
  margin-bottom:15px;
}

.sectionTitle{
  font-weight:bold;
  font-size:17px;
  color:var(--main);
  margin-top:20px;
}

ul{ padding-left:20px; }
ul li{ margin-bottom:6px; opacity:0; animation:fadeIn .5s forwards; }

@keyframes fadeIn {
  to { opacity:1; }
}

/* MESSAGE FIN */

.doneMsg{
  text-align:center;
  font-size:24px;
  margin-top:30px;
  color:var(--main);
  display:none;
}

</style>
</head>

let done = JSON.parse(localStorage.getItem("debatsDone") || "[]");
let current = null;

/* --- Mise à jour du compteur --- */
function updateProgress(){
  const count = done.length;
  document.getElementById("compteur").innerText = `Débats faits : ${count} / 100`;
  document.getElementById("progressBar").style.width = (count)+"%";
}

/* --- NOUVEAU DÉBAT --- */
function newDebat(){
  const remaining = debats.filter(d => !done.includes(d.id));
  if(remaining.length === 0){
    document.getElementById("box").style.display="none";
    document.getElementById("doneMsg").style.display="block";
    return;
  }

  document.getElementById("doneMsg").style.display="none";

  current = remaining[Math.floor(Math.random()*remaining.length)];

  document.getElementById("titre").innerText = current.titre;
  document.getElementById("question").innerText = current.question;

  const a = document.getElementById("aides");
  a.innerHTML="";
  current.aides.forEach(x=>{
    const li=document.createElement("li");
    li.innerText=x;
    a.appendChild(li);
  });

  const r = document.getElementById("relances");
  r.innerHTML="";
  current.relances.forEach(x=>{
    const li=document.createElement("li");
    li.innerText=x;
    r.appendChild(li);
  });

  document.getElementById("box").style.display="block";
}

/* --- MARQUER COMME FAIT --- */
function markDone(){
  if(!current) return;
  if(!done.includes(current.id)){
    done.push(current.id);
    localStorage.setItem("debatsDone", JSON.stringify(done));
  }
  updateProgress();
  newDebat();
  document.getElementById("btnReset").style.display="block";
}

/* --- RÉINITIALISER --- */
function resetAll(){
  if(!confirm("Réinitialiser tous les débats ?")) return;
  done=[];
  localStorage.removeItem("debatsDone");
  updateProgress();
  document.getElementById("btnReset").style.display="none";
  document.getElementById("box").style.display="none";
  document.getElementById("doneMsg").style.display="none";
}

/* --- COPIER LA QUESTION --- */
function copyQuestion(){
  navigator.clipboard.writeText(current.question);
  alert("Question copiée !");
}

updateProgress();

</script>
