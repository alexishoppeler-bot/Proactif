<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Débats oraux – Proactif</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{
    font-family: Arial, sans-serif;
    background:#eef2f6;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .app{
    width:900px;
    max-width:95%;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 6px 25px rgba(0,0,0,.12);
  }
  h1{
    text-align:center;
    margin-bottom:10px;
  }
  .controls{
    text-align:center;
    margin-bottom:25px;
  }
  button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    margin:5px;
    background:#006bb3;
    color:white;
    font-size:16px;
    cursor:pointer;
  }
  button:hover{
    background:#005999;
  }
  .bloc{
    margin-bottom:25px;
    padding:20px;
    background:#f7f9fb;
    border-radius:12px;
    font-size:20px;
    line-height:1.5;
  }
  .aides{
    font-size:18px;
    margin-top:15px;
  }
  .aides ul{
    padding-left:23px;
  }
  textarea{
    width:100%;
    height:120px;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #aaa;
    margin-top:10px;
    resize:none;
  }
</style>
</head>
<body>

<div class="app">
  <h1>Débats oraux – Proactif</h1>

  <div class="controls">
    <button onclick="charger('A1')">Débat A1</button>
    <button onclick="charger('A2')">Débat A2</button>
    <button onclick="charger('B1')">Débat B1</button>
    <button onclick="charger()">Débat aléatoire</button>
  </div>

  <div id="zone-debat" class="bloc">
    👉 Cliquez sur un bouton pour afficher un débat.
  </div>

  <div id="zone-aides" class="bloc aides"></div>

  <div class="bloc">
    <b>Votre réponse :</b>
    <textarea placeholder="Parlez... écrivez... utilisez les phrases d’aide !"></textarea>
  </div>
</div>

<script>
let DATA = null;

// Charger le fichier JSON
fetch('debats.json')
  .then(response => response.json())
  .then(json => { DATA = json; })
  .catch(() => alert("Erreur : impossible de charger debats.json"));

// Afficher un débat
function charger(niveau){
  if(!DATA){
    alert("Le fichier JSON n'est pas encore chargé.");
    return;
  }

  let liste = [];

  if(niveau){
    liste = DATA[niveau];
  } else {
    liste = [...DATA.A1, ...DATA.A2, ...DATA.B1];
  }

  const debat = liste[Math.floor(Math.random() * liste.length)];

  document.getElementById("zone-debat").innerHTML =
    `<b>${debat.titre}</b><br><br>${debat.question}`;

  document.getElementById("zone-aides").innerHTML =
    `<b>Phrases d’aide :</b><ul>${debat.aides.map(a=>`<li>${a}</li>`).join("")}</ul>`;
}
</script>

</body>
</html>
