<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lettre de candidature – Pro Suisse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body{
      font-family:Arial, sans-serif;
      background:#eef2f6;
      display:flex;
      justify-content:center;
      padding:30px 10px;
    }

    .app{
      width:820px;
      background:#fff;
      border-radius:16px;
      box-shadow:0 6px 25px rgba(0,0,0,.12);
      overflow:hidden;
    }

    header{
      background:#004c97;
      color:#fff;
      padding:20px;
      text-align:center;
      font-size:20px;
    }

    section{padding:20px}

    input,select{
      width:100%;
      padding:10px;
      border-radius:6px;
      border:1px solid #bbb;
      margin-bottom:10px;
      font-size:15px;
    }
    input[readonly]{ background:#f2f4f7; }

    h3{ 
      margin-top:25px; 
      color:#003366;
    }

    /* Barre PDF */
    .toolbar{
      display:flex;
      justify-content:flex-end;
      padding:12px 20px;
      background:#eef3f9;
      border-top:1px solid #ddd;
    }
    .toolbar button{
      padding:8px 14px;
      border-radius:6px;
      font-size:14px;
      cursor:pointer;
      background:#3f71ff;
      color:white;
      border:none;
    }

    /* Zone lettre */
    .letter{
      background:#f9fafb;
      padding:30px 45px;
      line-height:1.4;
      border-top:1px solid #ddd;
      font-size:16px;
      min-height:260px;
    }

    /* Justifier le texte */
    .justif{
      text-align:justify;
      text-justify:inter-word;
    }

    /* Espacements */
    .sp-md{margin-bottom:16px;}
    .sp-lg{margin-bottom:24px;}
    .sp-xl{margin-bottom:36px;}

    /* Destinataire légèrement à droite */
    .destinataire{
      margin-left:auto;
      margin-right:3cm;
      width:fit-content;
      text-align:left;
      line-height:1.2;
    }

    /* Signature encore un peu plus à droite */
    .signature{
      margin-left:auto;
      margin-right:3cm;
      width:fit-content;
      text-align:left;
      line-height:1.2;
    }

    button{
      margin:20px auto;
      display:block;
      background:#3f71ff;
      color:white;
      border:none;
      padding:12px 35px;
      font-size:16px;
      border-radius:10px;
      cursor:pointer;
    }
    .reset{background:#777}

    .btn-small{
      padding:8px 15px;
      font-size:13px;
      border-radius:8px;
    }

    /* Qualités */
    .qual-buttons{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:8px;
      margin-top:10px;
    }
    .qbtn{
      background:#eef3f9;
      color:#003366;
      border:1px solid #aac2ff;
      padding:8px;
      border-radius:8px;
      font-size:14px;
      cursor:pointer;
    }
    .qbtn.active{
      background:#3f71ff;
      color:white;
    }

  </style>
</head>


<body>
<div class="app">
  <header>📄 Lettre de candidature – Format Suisse</header>

  <section>

    <h3>👤 Expéditeur</h3>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <button class="btn-small" onclick="unlockExpediteur()" style="background:#888;">✏️ Modifier</button>
      <button class="btn-small" onclick="lockAndSaveExpediteur()" style="background:#2ecc71;">💾 Sauvegarder</button>
    </div>

    <input id="prenom" placeholder="Prénom" oninput="updateLetter()">
    <input id="nom" placeholder="Nom" oninput="updateLetter()">
    <input id="adresse" placeholder="Adresse" oninput="updateLetter()">
    <input id="npa" placeholder="NPA" oninput="updateLetter()">
    <input id="ville" placeholder="Ville" oninput="updateLetter()">
    <input id="tel" placeholder="Téléphone" oninput="updateLetter()">
    <input id="mail" placeholder="E-mail" oninput="updateLetter()">

    <h3>🏢 Destinataire</h3>
    <input id="entreprise" placeholder="Entreprise" oninput="saveDestinataire();updateLetter()">
    <input id="adresseEnt" placeholder="Adresse entreprise" oninput="saveDestinataire();updateLetter()">
    <input id="npaEnt" placeholder="NPA + Ville entreprise" oninput="saveDestinataire();updateLetter()">

    <h3>📌 Type de candidature</h3>
    <select id="typeCand" onchange="updateLetter()">
      <option value="">Choisir</option>
      <option value="spontanee">Candidature spontanée</option>
      <option value="ciblee">Candidature ciblée</option>
    </select>

    <input id="site" placeholder="Site d’annonce (Indeed…)" oninput="updateLetter()">
    <input id="poste" placeholder="Poste recherché" oninput="updateLetter()">

    <h3>⭐ Qualités (max 3)</h3>
    <div class="qual-buttons">
      <button class="qbtn" data-key="ponctuel" onclick="toggleQualite('ponctuel')">Ponctuel</button>
      <button class="qbtn" data-key="motive" onclick="toggleQualite('motive')">Motivé·e</button>
      <button class="qbtn" data-key="serieux" onclick="toggleQualite('serieux')">Sérieux·se</button>
      <button class="qbtn" data-key="autonome" onclick="toggleQualite('autonome')">Autonome</button>
      <button class="qbtn" data-key="organise" onclick="toggleQualite('organise')">Organisé·e</button>
      <button class="qbtn" data-key="fiable" onclick="toggleQualite('fiable')">Fiable</button>
      <button class="qbtn" data-key="respectueux" onclick="toggleQualite('respectueux')">Respectueux·se</button>
      <button class="qbtn" data-key="polyvalent" onclick="toggleQualite('polyvalent')">Polyvalent·e</button>
      <button class="qbtn" data-key="soigneux" onclick="toggleQualite('soigneux')">Soigneux·se</button>
      <button class="qbtn" data-key="rapide" onclick="toggleQualite('rapide')">Rapide</button>
    </div>

  </section>

  <div class="toolbar">
    <button onclick="exportPDF()">📄 Export PDF</button>
  </div>

  <div id="letter" class="letter" contenteditable="true"></div>

  <button class="reset" onclick="resetLetterOnly()">🧹 Vider la lettre</button>
  <button class="reset" onclick="resetAll()">🔄 Réinitialiser tout</button>
</div>


<script>
/* AUTO-SAUVEGARDE EXPÉDITEUR */
const expFields = ["prenom","nom","adresse","npa","ville","tel","mail"];

function loadExpediteur(){
  expFields.forEach(id=>{
    const saved = localStorage.getItem("expediteur_"+id);
    if(saved !== null){
      const el = document.getElementById(id);
      el.value = saved;
      el.setAttribute("readonly", true);
    }
  });
}

function unlockExpediteur(){
  expFields.forEach(id=>{
    document.getElementById(id).removeAttribute("readonly");
  });
  alert("Modification activée.");
}

function lockAndSaveExpediteur(){
  expFields.forEach(id=>{
    const el = document.getElementById(id);
    localStorage.setItem("expediteur_"+id, el.value);
    el.setAttribute("readonly", true);
  });
  alert("Informations sauvegardées !");
  updateLetter();
}


/* QUALITÉS */
let qualitesChoisies = [];

function toggleQualite(key){
  const i = qualitesChoisies.indexOf(key);
  if(i > -1) qualitesChoisies.splice(i,1);
  else if(qualitesChoisies.length < 3) qualitesChoisies.push(key);

  document.querySelectorAll('.qbtn').forEach(btn=>{
    btn.classList.toggle('active', qualitesChoisies.includes(btn.dataset.key));
  });

  updateLetter();
}


/* LETTRE GÉNÉRÉE */
function updateLetter(){

  const val = id => document.getElementById(id).value.trim();

  const p = val("prenom");
  const n = val("nom");
  const adr = val("adresse");
  const npa = val("npa");
  const v = val("ville");
  const tel = val("tel");
  const mail = val("mail");

  const ent = val("entreprise");
  const adrE = val("adresseEnt");
  const npaE = val("npaEnt");

  const type = val("typeCand");
  const site = val("site");
  const poste = val("poste");

  const L = document.getElementById("letter");

  if(!(p && n)){
    L.innerHTML = "<div class='sp-md'>👉 Entrez au minimum le prénom et le nom.</div>";
    return;
  }

  /* Activation/désactivation du site */
  const siteInput = document.getElementById("site");
  siteInput.disabled = (type === "spontanee");
  if(type === "spontanee") siteInput.value = "";

  /* Introduction */
  let intro = "";
  if(type === "ciblee" && site){
    intro = `Suite à l’annonce publiée sur ${site}, je vous soumets ma candidature pour le poste de ${poste || '[poste]'}.`;
  } else {
  intro = `Je vous adresse ma candidature spontanée pour le poste de ${poste || '[poste]'}. Votre entreprise m’intéresse particulièrement, car elle est reconnue pour son sérieux et la qualité de son travail. J’aimerais contribuer à votre équipe avec motivation et professionnalisme.`;
  }

  /* Qualités */
  const mapQ = {
  ponctuel: "Je respecte toujours les horaires et je suis présent de manière fiable.",
  motive: "Je m’intéresse au travail confié et je m’implique dans mes tâches.",
  serieux: "Je travaille avec soin et je respecte les consignes données.",
  autonome: "Je peux réaliser mon travail seul quand c’est nécessaire.",
  organise: "Je m’organise pour travailler de façon efficace.",
  fiable: "On peut compter sur moi pour accomplir les tâches demandées.",
  respectueux: "Je respecte les collègues, la hiérarchie et les règles de l’entreprise.",
  polyvalent: "Je m’adapte facilement aux différents besoins du poste.",
  soigneux: "Je fais attention à la qualité de mon travail.",
  rapide: "Je travaille rapidement tout en gardant une bonne qualité."
  };

  let qualTxt = "";
  if(qualitesChoisies.length){
    qualTxt = qualitesChoisies.map(k=>mapQ[k]).join(" ");
    qualTxt += " Ces qualités me permettent de répondre efficacement aux attentes du poste.";
  }

  /* Objet */
  const objet = type==="spontanee"
    ? `Candidature spontanée – ${poste || '[poste]'}`
    : `Candidature – ${poste || '[poste]'}`;

  /* LETTRE GÉNÉRÉE */
  L.innerHTML = `
<div class="sp-md">
${p} ${n.toUpperCase()}<br>
${adr}<br>
${npa} ${v}<br>
Tél. : ${tel}<br>
E-mail : ${mail}
</div>

<div class="destinataire sp-lg">
${ent}<br>
${adrE}<br>
${npaE}
</div>

<div class="sp-md"><strong>Objet : ${objet}</strong></div>

<div class="sp-md">Madame, Monsieur,</div>

<div class="justif">
  <div class="sp-md">${intro}</div>
  <div class="sp-md">${qualTxt}</div>

  <div class="sp-md">
    Je souhaite m’inscrire dans une collaboration sérieuse et durable,
    en respectant les règles de travail et en contribuant activement
    au bon fonctionnement de votre équipe.
  </div>

  <div class="sp-md">
    Disponible immédiatement, je reste à votre disposition pour un entretien.
  </div>
</div>

<div class="sp-xl">Cordialement,</div>

<div class="signature">
${p} ${n.toUpperCase()}
</div>
`;
}


/* PDF – ARIAL */
function exportPDF(){
  const filename = prompt("Nom du fichier PDF :", "lettre_candidature.pdf") || "lettre_candidature.pdf";

  const element = document.getElementById('letter');
  const clone = element.cloneNode(true);

  clone.style.width = "210mm";
  clone.style.padding = "20mm";
  clone.style_background = "white";
  clone.style.fontFamily = "Arial, sans-serif";

  document.body.appendChild(clone);

  html2canvas(clone,{scale:2}).then(canvas=>{
    const img = canvas.toDataURL("image/png");
    const pdf = new jspdf.jsPDF("p","mm","a4");

    const w = 210;
    const h = canvas.height * w / canvas.width;

    pdf.addImage(img,"PNG",0,0,w,h);
    pdf.save(filename);
    clone.remove();
  });
}


/* RESET */
function resetLetterOnly(){ document.getElementById('letter').innerHTML=""; }

function resetAll(){
  ["entreprise","adresseEnt","npaEnt","typeCand","site","poste"]
    .forEach(id => document.getElementById(id).value="");

  document.getElementById("site").disabled = false;

  qualitesChoisies = [];
  document.querySelectorAll('.qbtn').forEach(btn=>btn.classList.remove('active'));

  updateLetter();
}


/* DESTINATAIRE AUTO-SAUVEGARDE */
function saveDestinataire(){
  const data = {
    entreprise: entreprise.value,
    adresse: adresseEnt.value,
    npa: npaEnt.value
  };
  localStorage.setItem("destinataire", JSON.stringify(data));
}

function loadDestinataire(){
  const d = localStorage.getItem("destinataire");
  if(!d) return;
  const data = JSON.parse(d);

  entreprise.value = data.entreprise || "";
  adresseEnt.value = data.adresse || "";
  npaEnt.value = data.npa || "";
}


/* AU CHARGEMENT */
window.onload = () => {
  loadExpediteur();
  loadDestinataire();
  updateLetter();
};
</script>

</body>
</html>
